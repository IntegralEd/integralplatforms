name: Sync Theme to Microsites

on:
  push:
    branches:
      - main

jobs:
  sync:
    name: Sync to ${{ matrix.repo }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        repo:
          - IntegralEd/integral-themes-playground
          - IntegralEd/integralcareerpathways
          - IntegralEd/integralgrowthstrategies
          - IntegralEd/integralcapacity
          - IntegralEd/integralplatforms
          - IntegralEd/integralelearning
          - IntegralEd/integralmediadesign
          - IntegralEd/mathbalance

    steps:
      - name: Checkout integralthemes (source)
        uses: actions/checkout@v4
        with:
          path: integralthemes
          fetch-depth: 0

      - name: Checkout microsite (${{ matrix.repo }})
        uses: actions/checkout@v4
        with:
          repository: ${{ matrix.repo }}
          token: ${{ secrets.Style_Push_Microsites }}
          path: microsite
          fetch-depth: 0

      - name: Configure Git
        run: |
          cd microsite
          git config user.name "Integral Themes Bot"
          git config user.email "noreply@integral-ed.com"

      - name: Check if microsite is ready for theme sync
        id: check_vendor
        run: |
          cd microsite
          if [ -d "vendor/integralthemes" ]; then
            echo "ready=true" >> $GITHUB_OUTPUT
            echo "✓ vendor/integralthemes exists - proceeding with sync"
          else
            echo "ready=false" >> $GITHUB_OUTPUT
            echo "⚠ vendor/integralthemes not found - skipping sync"
            echo "This microsite is not yet configured to use the shared theme."
          fi

      - name: Sync theme files
        if: steps.check_vendor.outputs.ready == 'true'
        run: |
          # rsync works regardless of how vendor was originally set up
          # (direct copy or git subtree — both are handled correctly)
          rsync -av --delete integralthemes/. microsite/vendor/integralthemes/

          cd microsite
          git add vendor/integralthemes/

          if git diff --cached --quiet; then
            echo "✓ vendor/integralthemes already up to date — nothing to commit"
          else
            git commit -m "Update vendored integralthemes from upstream ($(echo ${{ github.sha }} | cut -c1-7))"
            echo "✓ Committed theme updates"
            git push origin main
            echo "✓ Pushed to ${{ matrix.repo }}"
          fi

      - name: Report skip
        if: steps.check_vendor.outputs.ready == 'false'
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "SKIPPED: ${{ matrix.repo }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "This microsite does not yet have vendor/integralthemes."
          echo "To enable automatic theme sync, create the directory and"
          echo "copy the integralthemes source into it:"
          echo ""
          echo "  mkdir -p vendor/integralthemes"
          echo "  cp -r path/to/integralthemes/. vendor/integralthemes/"
          echo "  git add vendor/integralthemes && git commit -m 'Add integralthemes vendor'"
          echo ""
          echo "This is expected during rollout and is not an error."
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: Summary
        if: always()
        run: |
          cd microsite
          if [ -d "vendor/integralthemes" ]; then
            echo "✅ ${{ matrix.repo }}: Theme sync completed"
          else
            echo "⏭️  ${{ matrix.repo }}: Skipped (not yet configured)"
          fi
